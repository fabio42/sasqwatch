name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: Build, vet & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      - name: go test (with race detector)
        run: go test -race -count=1 ./...
